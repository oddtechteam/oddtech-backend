# Bind to Railway's injected port (also set via -Dserver.port=${PORT} in entrypoint)
server.port=${SERVER_PORT:8080}

# --- DataSource (values come from Railway Variables) ---
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# --- Actuator (for health checks) ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
# TEMP while debugging: show component details (DB etc). Remove later.
management.endpoint.health.show-details=always

# --- CORS (we read env directly in your WebSecurityConfiguration) ---
# (Optional) If you prefer Spring props, wire your CORS bean to read this instead of System.getenv:
# app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# --- Face/Python services (env-driven) ---
face.api.url=${FACE_API_URL:}
face.api.key=${FACE_API_KEY:}

# Google creds (if you use them)
spring.cloud.gcp.credentials.location=${SPRING_CLOUD_GCP_CREDENTIALS_LOCATION:}
google.translate.api.key=${GOOGLE_TRANSLATE_API_KEY:}
